{% extends "base.html" %}

{% block title %}500 Internal Server Error{% endblock %}

{% block head %}
<style>
  .error-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 70vh;
    text-align: center;
    padding: 2rem;
  }
  .error-code {
    font-size: 8rem;
    font-weight: 800;
    color: var(--color-primary);
    line-height: 1;
    margin-bottom: 1rem;
  }
  .error-title {
    font-size: 2rem;
    font-weight: 600;
    margin-bottom: 1rem;
    color: var(--color-brand-black);
  }
  .error-message {
    color: var(--color-text-muted);
    font-size: 1.125rem;
    max-width: 500px;
    margin-bottom: 2rem;
  }
</style>
{% endblock %}

{% block content %}
<div class="error-container">
  <div class="error-code">500</div>
  <h1 class="error-title">Internal Server Error</h1>
  <p class="error-message">Oops! Something went wrong on our end. We've been notified and are looking into it.</p>
  <a href="{{ url_for('index') }}" class="btn btn-primary" style="padding: 0.75rem 2rem; font-size: 1rem;">Return Home</a>
</div>
{% endblock %}

{% extends "base_dashboard.html" %}

{% block page_title %}My Profile{% endblock %}

{% block content %}
<div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 2rem;">
  <div>
    <h1 class="hero-title" style="font-size: 2.5rem; margin-bottom: 0.5rem;">My Profile</h1>
    <p class="text-muted" style="margin: 0;">Update your personal information and password.</p>
  </div>
</div>

<div class="grid-cols-2" style="max-width: 800px;">
  <div class="card">
    <div class="card-header">
      <h3 class="card-title">Profile Settings</h3>
    </div>
    <div class="card-body">
      <form method="POST" action="{{ url_for('auth.profile') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" class="form-control bg-light" value="{{ g.user.email }}" readonly disabled>
          <div class="text-muted" style="font-size: 0.75rem; margin-top: 0.25rem;">Email cannot be changed.</div>
        </div>

        <div class="form-group">
          <label class="form-label" for="name">Full Name</label>
          <input id="name" type="text" name="name" class="form-control" value="{{ g.user.name }}">
        </div>

        <hr style="margin: 2rem 0; border-color: var(--color-border);">

        <h4 style="font-size: 1.125rem; font-weight: 600; margin-bottom: 1rem;">Change Password</h4>
        
        <div class="form-group">
          <label class="form-label" for="password">New Password</label>
          <input id="password" type="password" name="password" class="form-control" placeholder="Leave blank to keep current">
        </div>

        <button type="submit" class="btn btn-primary mt-3">
          Save Changes
        </button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
